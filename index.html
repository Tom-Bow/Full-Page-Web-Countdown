<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Countdown</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <div class="countdown">
        <div class="time">
            <span id="days">00</span>
            <label>Days</label>
        </div>
        <div class="time">
            <span id="hours">00</span>
            <label>Hours</label>
        </div>
        <div class="time">
            <span id="minutes">00</span>
            <label>Minutes</label>
        </div>
        <div class="time">
            <span id="seconds">00</span>
            <label>Seconds</label>
        </div>
    </div>

    <div class="message">
        <p class="'loc">Tromsø, Norway</p>
        <p>Sunday, 18th Jan 2026</p>
    </div>


</body>
<script src="script.js"></script>

</html>
